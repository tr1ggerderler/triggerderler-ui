<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>triggerderler UI</title>
    <!-- Google Fonts: Outfit & Plus Jakarta Sans -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --accent-color: 255, 0, 0; /* Default Red */
            --bg-main: #0b0c13;
            --bg-card: rgba(18, 20, 32, 0.95);
            --bg-item: rgba(255, 255, 255, 0.03);
            --bg-item-hover: rgba(255, 255, 255, 0.07);
            --border-color: rgba(255, 255, 255, 0.06);
            --text-main: #ffffff;
            --text-muted: #8b8e9f;
            --success-color: #00ff87;
            --error-color: #ff3e3e;
            --info-color: #00bfff;
            --warning-color: #ffaa00;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            user-select: none;
            outline: none;
            -webkit-user-drag: none;
        }

        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background-color: transparent;
            color: var(--text-main);
            overflow: hidden;
            width: 100vw;
            height: 100vh;
            display: flex;
            justify-content: flex-start;
            align-items: flex-start;
            padding-left: 50px;
            padding-top: 120px;
        }

        /* --- WATERMARK & PLAYER INFO --- */
        #watermark {
            position: absolute;
            top: 20px;
            right: 20px;
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            padding: 10px 18px;
            border-radius: 10px;
            font-family: 'Outfit', sans-serif;
            display: flex;
            flex-direction: column;
            gap: 4px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            animation: fadeInRight 0.5s cubic-bezier(0.16, 1, 0.3, 1);
            border-left: 3px solid rgb(var(--accent-color));
        }

        #watermark .title {
            font-size: 14px;
            font-weight: 700;
            letter-spacing: 1px;
            text-transform: uppercase;
            color: rgb(var(--accent-color));
        }

        #watermark .user-info {
            font-size: 12px;
            color: var(--text-muted);
            display: flex;
            gap: 10px;
        }

        #watermark .user-info span {
            color: var(--text-main);
            font-weight: 600;
        }

        /* --- MAIN MENU CONTAINER --- */
        #menu-container {
            width: 380px;
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            border-radius: 16px;
            box-shadow: 0 30px 60px rgba(0, 0, 0, 0.7), 
                        0 0 40px rgba(var(--accent-color), 0.05);
            overflow: hidden;
            display: flex;
            flex-direction: column;
            transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1);
            transform: scale(0.95);
            opacity: 0;
            pointer-events: none;
            border-top: 4px solid rgb(var(--accent-color));
        }

        #menu-container.active {
            transform: scale(1);
            opacity: 1;
            pointer-events: auto;
        }

        /* Top Header Banner */
        .menu-header {
            position: relative;
            width: 100%;
            height: 140px;
            background: linear-gradient(rgba(0,0,0,0.1), rgba(0,0,0,0.8)), url('banner.png');
            background-size: cover;
            background-position: center 70%;
            display: flex;
            flex-direction: column;
            justify-content: flex-end;
            padding: 20px;
        }

        .menu-header h1 {
            font-family: 'Outfit', sans-serif;
            font-size: 28px;
            font-weight: 800;
            letter-spacing: 0.5px;
            text-shadow: 0 2px 10px rgba(0,0,0,0.5);
        }

        .menu-header p {
            font-size: 11px;
            color: var(--text-muted);
            margin-top: 2px;
            font-weight: 500;
            text-shadow: 0 1px 5px rgba(0,0,0,0.5);
        }

        /* Navigation Path bar */
        .navigation-path {
            background: rgba(0, 0, 0, 0.2);
            border-bottom: 1px solid var(--border-color);
            padding: 8px 16px;
            font-size: 11px;
            color: var(--text-muted);
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 5px;
        }

        .navigation-path span.active-path {
            color: rgb(var(--accent-color));
        }

        /* Menu Elements / Scroll Area */
        .menu-elements {
            padding: 16px;
            max-height: 420px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        /* Custom Scrollbar */
        .menu-elements::-webkit-scrollbar {
            width: 4px;
        }
        .menu-elements::-webkit-scrollbar-track {
            background: transparent;
        }
        .menu-elements::-webkit-scrollbar-thumb {
            background: rgba(255,255,255,0.1);
            border-radius: 10px;
        }

        /* Menu Item Styling */
        .menu-item {
            background: rgba(255, 255, 255, 0.02);
            border: 1px solid rgba(255, 255, 255, 0.04);
            border-radius: 10px;
            padding: 13px 16px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            transition: all 0.22s cubic-bezier(0.16, 1, 0.3, 1);
            position: relative;
            overflow: hidden;
            box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.02);
        }

        .menu-item .label-group {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .menu-item .label-text-wrapper {
            display: flex;
            flex-direction: column;
            gap: 1px;
        }

        .menu-item .title {
            font-size: 13px;
            font-weight: 600;
            color: rgba(255, 255, 255, 0.85);
            transition: color 0.2s ease;
        }

        .menu-item .description {
            font-size: 10px;
            color: var(--text-muted);
            max-width: 240px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        /* SVG Icons inside menu items */
        .menu-item .item-icon {
            width: 18px;
            height: 18px;
            color: rgba(255, 255, 255, 0.45);
            transition: all 0.2s ease;
        }

        /* Hover & Focus states */
        .menu-item.hovered {
            background: rgba(var(--accent-color), 0.08);
            border-color: rgba(var(--accent-color), 0.3);
            transform: translateX(4px);
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.25), 
                        inset 0 1px 0 rgba(var(--accent-color), 0.1);
        }

        .menu-item.hovered .title {
            color: #ffffff;
            text-shadow: 0 0 8px rgba(var(--accent-color), 0.3);
        }

        .menu-item.hovered .item-icon {
            color: rgb(var(--accent-color));
            filter: drop-shadow(0 0 4px rgba(var(--accent-color), 0.5));
            transform: scale(1.1);
        }

        .menu-item.hovered::before {
            content: '';
            position: absolute;
            left: 0;
            top: 0;
            height: 100%;
            width: 3px;
            background: rgb(var(--accent-color));
            box-shadow: 0 0 8px rgb(var(--accent-color));
        }

        /* Badges / Values / Chevrons on the right */
        .menu-item .value-badge {
            font-size: 11px;
            font-weight: 700;
            background: rgba(255,255,255,0.04);
            padding: 3px 8px;
            border-radius: 6px;
            border: 1px solid rgba(255,255,255,0.06);
            color: var(--text-muted);
            transition: all 0.2s ease;
        }

        .menu-item .chevron {
            display: flex;
            align-items: center;
            justify-content: center;
            width: 22px;
            height: 22px;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.05);
            color: rgba(255, 255, 255, 0.4);
            transition: all 0.2s ease;
        }

        .menu-item.hovered .chevron {
            background: rgba(var(--accent-color), 0.15);
            border-color: rgba(var(--accent-color), 0.4);
            color: #ffffff;
            box-shadow: 0 0 6px rgba(var(--accent-color), 0.25);
            transform: translateX(2px);
        }

        .menu-item.hovered .value-badge {
            background: rgba(var(--accent-color), 0.12);
            border-color: rgba(var(--accent-color), 0.3);
            color: rgb(var(--accent-color));
        }

        /* Checkbox item types */
        .menu-item .checkbox-ui {
            width: 18px;
            height: 18px;
            border-radius: 4px;
            border: 2px solid var(--text-muted);
            display: flex;
            justify-content: center;
            align-items: center;
            transition: all 0.2s ease;
        }

        .menu-item.checked .checkbox-ui {
            background: rgb(var(--accent-color));
            border-color: rgb(var(--accent-color));
        }

        .menu-item.checked .checkbox-ui::after {
            content: '';
            width: 5px;
            height: 9px;
            border: solid white;
            border-width: 0 2px 2px 0;
            transform: rotate(45deg);
            margin-bottom: 2px;
        }

        /* Divider Item Styling */
        .menu-divider {
            font-size: 10px;
            font-weight: 800;
            letter-spacing: 1px;
            text-transform: uppercase;
            color: rgb(var(--accent-color));
            margin-top: 10px;
            margin-bottom: 5px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .menu-divider::after {
            content: '';
            flex: 1;
            height: 1px;
            background: var(--border-color);
        }

        /* Keybind list footer overlay */
        .keybind-list {
            position: absolute;
            bottom: 20px;
            left: 450px;
            width: 260px;
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            padding: 14px;
            display: flex;
            flex-direction: column;
            gap: 8px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.6);
            opacity: 0;
            transform: translateY(10px);
            transition: all 0.3s cubic-bezier(0.16, 1, 0.3, 1);
            pointer-events: none;
        }

        .keybind-list.active {
            opacity: 1;
            transform: translateY(0);
        }

        .keybind-title {
            font-size: 12px;
            font-weight: 700;
            color: rgb(var(--accent-color));
            text-transform: uppercase;
            letter-spacing: 0.5px;
            border-bottom: 1px solid var(--border-color);
            padding-bottom: 6px;
        }

        .keybind-row {
            display: flex;
            justify-content: space-between;
            font-size: 11px;
        }

        .keybind-row .key-val {
            color: rgb(var(--accent-color));
            font-weight: 700;
        }

        /* --- NOTIFICATION TOAST CONTAINER --- */
        #notification-container {
            position: absolute;
            bottom: 20px;
            right: 20px;
            width: 320px;
            z-index: 9999;
            display: flex;
            flex-direction: column-reverse;
            gap: 12px;
            pointer-events: none;
        }

        .notification {
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            border-radius: 10px;
            padding: 16px;
            display: flex;
            flex-direction: column;
            gap: 4px;
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.5);
            position: relative;
            overflow: hidden;
            animation: slideInRight 0.35s cubic-bezier(0.16, 1, 0.3, 1) forwards;
            pointer-events: auto;
        }

        .notification::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 4px;
            height: 100%;
        }

        .notification.success::before { background: var(--success-color); }
        .notification.error::before { background: var(--error-color); }
        .notification.info::before { background: var(--info-color); }
        .notification.warning::before { background: var(--warning-color); }

        .notification .notif-title {
            font-size: 13px;
            font-weight: 700;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .notification.success .notif-title { color: var(--success-color); }
        .notification.error .notif-title { color: var(--error-color); }
        .notification.info .notif-title { color: var(--info-color); }
        .notification.warning .notif-title { color: var(--warning-color); }

        .notification .notif-desc {
            font-size: 11px;
            color: var(--text-muted);
            line-height: 1.4;
        }

        /* Notification Countdown progress bar */
        .notification .progress-bar {
            position: absolute;
            bottom: 0;
            left: 0;
            height: 2px;
            width: 100%;
            transform-origin: left;
            background: rgba(255,255,255,0.2);
        }

        .notification.success .progress-bar { background: var(--success-color); }
        .notification.error .progress-bar { background: var(--error-color); }
        .notification.info .progress-bar { background: var(--info-color); }
        .notification.warning .progress-bar { background: var(--warning-color); }

        /* Keyframe Animations */
        @keyframes slideInRight {
            from {
                opacity: 0;
                transform: translateX(50px) scale(0.9);
            }
            to {
                opacity: 1;
                transform: translateX(0) scale(1);
            }
        }

        @keyframes fadeOut {
            to {
                opacity: 0;
                transform: translateY(-20px) scale(0.9);
            }
        }

        @keyframes fadeInRight {
            from {
                opacity: 0;
                transform: translateX(20px);
            }
            to {
                opacity: 1;
                transform: translateX(0);
            }
        }

        /* ── KEY PICKER MODAL ── */
        #key-picker-overlay {
            position: fixed;
            inset: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 9999;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.25s ease;
        }

        #key-picker-overlay.active {
            opacity: 1;
            pointer-events: auto;
        }

        .key-picker-card {
            background: rgba(14, 16, 26, 0.97);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-top: 3px solid rgb(var(--accent-color));
            border-radius: 18px;
            padding: 36px 44px;
            min-width: 360px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 20px;
            box-shadow: 0 40px 80px rgba(0,0,0,0.8), 0 0 60px rgba(var(--accent-color), 0.08);
            animation: pickCardIn 0.35s cubic-bezier(0.16, 1, 0.3, 1);
        }

        @keyframes pickCardIn {
            from { transform: scale(0.88) translateY(20px); opacity: 0; }
            to   { transform: scale(1) translateY(0);      opacity: 1; }
        }

        .key-picker-icon {
            width: 52px;
            height: 52px;
            background: rgba(var(--accent-color), 0.12);
            border: 1px solid rgba(var(--accent-color), 0.3);
            border-radius: 14px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: rgb(var(--accent-color));
        }

        .key-picker-icon svg {
            width: 26px;
            height: 26px;
        }

        .key-picker-title {
            font-family: 'Outfit', sans-serif;
            font-size: 18px;
            font-weight: 700;
            color: #fff;
            text-align: center;
        }

        .key-picker-sub {
            font-size: 12px;
            color: var(--text-muted);
            text-align: center;
            line-height: 1.6;
        }

        .key-display-box {
            background: rgba(255,255,255,0.04);
            border: 1.5px solid rgba(255,255,255,0.1);
            border-radius: 12px;
            padding: 16px 32px;
            font-family: 'Outfit', sans-serif;
            font-size: 22px;
            font-weight: 700;
            color: rgb(var(--accent-color));
            letter-spacing: 2px;
            min-width: 160px;
            text-align: center;
            transition: all 0.2s ease;
            box-shadow: inset 0 1px 0 rgba(255,255,255,0.05);
        }

        .key-display-box.has-key {
            border-color: rgba(var(--accent-color), 0.5);
            background: rgba(var(--accent-color), 0.06);
            box-shadow: 0 0 20px rgba(var(--accent-color), 0.12), inset 0 1px 0 rgba(255,255,255,0.05);
        }

        .key-picker-hint {
            font-size: 11px;
            color: rgba(255,255,255,0.25);
            text-align: center;
        }

        .key-picker-hint span {
            color: rgba(var(--accent-color), 0.8);
            font-weight: 600;
        }

        .key-picker-btn {
            padding: 10px 28px;
            border-radius: 10px;
            border: none;
            background: rgb(var(--accent-color));
            color: #fff;
            font-family: 'Outfit', sans-serif;
            font-size: 13px;
            font-weight: 700;
            letter-spacing: 0.5px;
            cursor: pointer;
            transition: all 0.2s ease;
            opacity: 0.4;
            pointer-events: none;
        }

        .key-picker-btn.ready {
            opacity: 1;
            pointer-events: auto;
            box-shadow: 0 4px 20px rgba(var(--accent-color), 0.35);
        }

        .key-picker-btn.ready:hover {
            transform: translateY(-1px);
            box-shadow: 0 6px 24px rgba(var(--accent-color), 0.45);
        }
    </style>
</head>
<body>

    <!-- NOTIFICATION CONTAINER -->
    <div id="notification-container"></div>

    <!-- WATERMARK -->
    <div id="watermark">
        <div class="title">triggerderler</div>
        <div class="user-info">
            Rank: <span id="user-rank">User</span>
            Discord: <span id="discord-name">Unknown</span>
            Expire: <span id="expire-date">N/A</span>
        </div>
    </div>

    <!-- MAIN MENU -->
    <div id="menu-container">
        <div class="menu-header" id="menu-banner">
            <h1 id="menu-title">Internal Menu</h1>
            <p id="menu-subtitle">Clean Executor UI Shell</p>
        </div>
        <div class="navigation-path" id="nav-path">
            triggerderler &gt; <span class="active-path" id="active-tab-path">Self</span>
        </div>
        <div class="menu-elements" id="menu-items-area">
            <!-- Dynamically populated via JS -->
        </div>
    </div>

    <!-- KEYBIND OVERLAY -->
    <div id="keybind-overlay" class="keybind-list">
        <div class="keybind-title">Active Keybinds</div>
        <div id="keybinds-area">
            <!-- Dynamically populated -->
        </div>
    </div>

    <!-- KEY PICKER MODAL - active by default so it shows immediately on DUI load -->
    <div id="key-picker-overlay" class="active">
        <div class="key-picker-card">
            <div class="key-picker-icon">
                <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <rect x="2" y="4" width="20" height="16" rx="2" ry="2"/>
                    <path d="M6 8h.01M10 8h.01M14 8h.01M18 8h.01M8 12h.01M12 12h.01M16 12h.01M7 16h10"/>
                </svg>
            </div>
            <div class="key-picker-title" id="key-picker-title">Menü Açma Tuşu</div>
            <div class="key-picker-sub">Menüyü açıp kapatmak için<br>kullanmak istediğin tuşa bas.</div>
            <div class="key-display-box" id="key-display">— BEKLIYOR —</div>
            <div class="key-picker-hint">Seçtikten sonra <span>Enter</span> ile onayla</div>
            <button class="key-picker-btn" id="key-picker-confirm">✓ Onayla</button>
        </div>
    </div>

                subTabs: [
                    { type: "button", label: "Menu Key" }
                ]
            }
        ];

        // Store state
        let currentItems = defaultMenuData;
        let menuStack = [];
        let menuLabelStack = ["triggerderler"];
        let hoveredIndex = 0;
        let accentRGB = "255, 0, 0";
        let isFiveM = false;

        // DOM elements
        const menuContainer = document.getElementById('menu-container');
        const menuItemsArea = document.getElementById('menu-items-area');
        const activeTabPath = document.getElementById('active-tab-path');
        const menuBanner = document.getElementById('menu-banner');
        
        const userRank = document.getElementById('user-rank');
        const discordName = document.getElementById('discord-name');
        const expireDate = document.getElementById('expire-date');

        const keybindOverlay = document.getElementById('keybind-overlay');
        const keybindsArea = document.getElementById('keybinds-area');

        // Helper to retrieve vector icons for premium menu appearance
        function getIconForLabel(label) {
            const icons = {
                "self": `<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="item-icon"><path d="M19 21v-2a4 4 0 0 0-4-4H9a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>`,
                "server": `<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="item-icon"><rect x="2" y="2" width="20" height="8" rx="2" ry="2"/><rect x="2" y="14" width="20" height="8" rx="2" ry="2"/><line x1="6" y1="6" x2="6.01" y2="6"/><line x1="6" y1="18" x2="6.01" y2="18"/></svg>`,
                "visuals": `<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="item-icon"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>`,
                "weapon": `<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="item-icon"><circle cx="12" cy="12" r="10"/><line x1="22" y1="12" x2="18" y2="12"/><line x1="6" y1="12" x2="2" y2="12"/><line x1="12" y1="6" x2="12" y2="2"/><line x1="12" y1="22" x2="12" y2="18"/></svg>`,
                "vehicle": `<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="item-icon"><path d="M19 17h2c.6 0 1-.4 1-1v-3c0-.9-.7-1.7-1.5-1.9C18.7 10.6 16 10 16 10s-1.3-1.4-2.2-2.3c-.5-.4-1.1-.7-1.8-.7H5c-.6 0-1.1.4-1.4.9l-1.4 2.9A3.7 3.7 0 0 0 2 12v4c0 .6.4 1 1 1h2"/><circle cx="7" cy="17" r="2"/><circle cx="17" cy="17" r="2"/></svg>`,
                "protections": `<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="item-icon"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg>`,
                "scripts": `<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="item-icon"><polyline points="16 18 22 12 16 6"/><polyline points="8 6 2 12 8 18"/></svg>`,
                "troll": `<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="item-icon"><path d="M12 2v20M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"/></svg>`,
                "teleports": `<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="item-icon"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"/><circle cx="12" cy="10" r="3"/></svg>`,
                "misc": `<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="item-icon"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 1 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 1 1-2.83-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 1 1 2.83-2.83l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 1 1 2.83 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>`,
                "design": `<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="item-icon"><path d="M12 22C17.5228 22 22 17.5228 22 12C22 6.47715 17.5228 2 12 2C6.47715 2 2 6.47715 2 12C2 14.7255 3.09032 17.1962 4.85857 19C5.03345 19.1749 5.0999 19.4294 5.02452 19.6615C4.78363 20.4042 4.90828 21.2263 5.44845 21.7665C5.75338 22.0714 6.16709 22.1961 6.56522 22.1408C6.96335 22.0855 7.32356 21.854 7.57393 21.4925C8.36195 20.3548 9.59367 19.5 11 19.5H12V22Z"/><circle cx="7.5" cy="10.5" r="1.5"/><circle cx="11.5" cy="7.5" r="1.5"/><circle cx="16.5" cy="9.5" r="1.5"/><circle cx="15.5" cy="14.5" r="1.5"/></svg>`,
                "keybinds": `<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="item-icon"><rect x="2" y="4" width="20" height="16" rx="2" ry="2"/><rect x="6" y="8" width="12" height="8" rx="1"/></svg>`
            };
            return icons[label.toLowerCase()] || "";
        }

        // Update elements in the menu area
        function updateElements(elements, pathStr, hoveredIdx) {
            menuItemsArea.innerHTML = '';
            currentItems = elements || [];
            hoveredIndex = hoveredIdx || 0;
            
            if (pathStr) {
                activeTabPath.innerText = pathStr;
            }

            currentItems.forEach((item, index) => {
                if (item.type === 'divider') {
                    const div = document.createElement('div');
                    div.className = 'menu-divider';
                    div.innerText = item.label;
                    menuItemsArea.appendChild(div);
                    return;
                }

                const div = document.createElement('div');
                div.className = `menu-item ${index === hoveredIndex ? 'hovered' : ''} ${item.checked ? 'checked' : ''}`;
                
                let badgeOrTypeHtml = '';
                if (item.type === 'checkbox' || item.type === 'scrollable-checkbox' || item.type === 'slider-checkbox') {
                    badgeOrTypeHtml = `<div class="checkbox-ui"></div>`;
                } else if (item.value !== undefined) {
                    badgeOrTypeHtml = `<div class="value-badge">${item.value}</div>`;
                } else if (item.type === 'subMenu') {
                    badgeOrTypeHtml = `
                        <div class="chevron">
                            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" style="width:10px;height:10px;">
                                <polyline points="9 18 15 12 9 6"/>
                            </svg>
                        </div>
                    `;
                }

                // Render vector icon if it exists for this tab
                const iconHtml = getIconForLabel(item.label);

                div.innerHTML = `
                    <div class="label-group">
                        ${iconHtml}
                        <div class="label-text-wrapper">
                            <div class="title">${item.label || ''}</div>
                            ${item.desc ? `<div class="description">${item.desc}</div>` : ''}
                        </div>
                    </div>
                    ${badgeOrTypeHtml}
                `;

                // Mouse interaction for standalone mode
                div.addEventListener('mouseenter', () => {
                    if (isFiveM) return; // Disallow in-game to prevent mouse cursor conflict
                    hoveredIndex = index;
                    document.querySelectorAll('.menu-item').forEach(el => el.classList.remove('hovered'));
                    div.classList.add('hovered');
                });

                div.addEventListener('click', () => {
                    if (isFiveM) return;
                    selectItem(item, index);
                });

                menuItemsArea.appendChild(div);
            });

            // Auto-scroll to hovered item
            const hoveredEl = menuItemsArea.querySelector('.menu-item.hovered');
            if (hoveredEl) {
                hoveredEl.scrollIntoView({ block: 'nearest', behavior: 'smooth' });
            }
        }

        // Handle item selection in browser preview mode
        function selectItem(item, index) {
            if (item.type === 'subMenu' || item.categories || item.subTabs || item.tabs) {
                menuStack.push([...currentItems]);
                menuLabelStack.push(item.label);
                
                if (item.categories) {
                    currentItems = item.categories;
                } else if (item.subTabs) {
                    currentItems = item.subTabs;
                } else if (item.tabs) {
                    currentItems = item.tabs;
                } else {
                    currentItems = [];
                }
                hoveredIndex = 0;
                updateElements(currentItems, menuLabelStack.join(" > "), hoveredIndex);
            } else if (item.type === 'checkbox') {
                item.checked = !item.checked;
                updateElements(currentItems, menuLabelStack.join(" > "), hoveredIndex);
                addNotification("info", item.label, item.checked ? "Aktif Edildi" : "Pasif Edildi", 2000);
            } else if (item.type === 'button') {
                addNotification("success", item.label, "İşlem başarıyla çalıştırıldı!", 2500);
            }
        }

        // Handle back navigation in browser preview mode
        function goBack() {
            if (menuStack.length > 0) {
                currentItems = menuStack.pop();
                menuLabelStack.pop();
                hoveredIndex = 0;
                updateElements(currentItems, menuLabelStack.join(" > "), hoveredIndex);
            }
        }

        // Browser Keyboard Listener for Standalone Preview Mode
        window.addEventListener('keydown', function(e) {
            if (isFiveM) return; // Ignore if loaded in game (FiveM Lua handles keypresses)

            if (e.key === 'ArrowUp') {
                e.preventDefault();
                hoveredIndex = (hoveredIndex - 1 + currentItems.length) % currentItems.length;
                updateElements(currentItems, menuLabelStack.join(" > "), hoveredIndex);
            } else if (e.key === 'ArrowDown') {
                e.preventDefault();
                hoveredIndex = (hoveredIndex + 1) % currentItems.length;
                updateElements(currentItems, menuLabelStack.join(" > "), hoveredIndex);
            } else if (e.key === 'Enter') {
                e.preventDefault();
                if (currentItems[hoveredIndex]) {
                    selectItem(currentItems[hoveredIndex], hoveredIndex);
                }
            } else if (e.key === 'Backspace') {
                e.preventDefault();
                goBack();
            }
        });

        // Add dynamically animated notification toast
        function addNotification(type, title, desc, duration) {
            const container = document.getElementById('notification-container');
            const notif = document.createElement('div');
            notif.className = `notification ${type || 'info'}`;
            
            // Set notification HTML
            notif.innerHTML = `
                <div class="notif-title">${title || 'triggerderler'}</div>
                <div class="notif-desc">${desc || ''}</div>
                <div class="progress-bar"></div>
            `;
            
            container.appendChild(notif);

            const progressBar = notif.querySelector('.progress-bar');
            duration = duration || 3000;

            // Animate progress bar shrinking
            progressBar.style.transition = `transform ${duration}ms linear`;
            progressBar.style.transform = 'scaleX(0)';

            // Auto-remove notification
            setTimeout(() => {
                notif.style.animation = 'fadeOut 0.3s cubic-bezier(0.16, 1, 0.3, 1) forwards';
                setTimeout(() => {
                    notif.remove();
                }, 300);
            }, duration);
        }

        // Set watermark player info
        function setPlayerId(id) {
            if (id) {
                const parts = id.split(' | ');
                if (parts.length > 1) {
                    userRank.innerText = parts[0];
                    discordName.innerText = parts[1];
                } else {
                    discordName.innerText = id;
                }
            }
        }

        function setExpire(date) {
            if (date) expireDate.innerText = date;
        }

        // Set header banner URL
        function updateBanner(colorHex, linkUrl) {
            if (linkUrl) {
                menuBanner.style.backgroundImage = `linear-gradient(rgba(0,0,0,0.1), rgba(0,0,0,0.8)), url('${linkUrl}')`;
            }
        }

        // Update Theme Accent Color
        function updateAccentColor(colorStr) {
            if (colorStr) {
                accentRGB = colorStr;
                document.documentElement.style.setProperty('--accent-color', colorStr);
            }
        }

        // Update keybind overlays
        function updateKeybinds(binds) {
            keybindsArea.innerHTML = '';
            if (binds && binds.length > 0) {
                keybindOverlay.classList.add('active');
                binds.forEach(bind => {
                    const row = document.createElement('div');
                    row.className = 'keybind-row';
                    row.innerHTML = `<span>${bind.name}</span><span class="key-val">${bind.key}</span>`;
                    keybindsArea.appendChild(row);
                });
            } else {
                keybindOverlay.classList.remove('active');
            }
        }

        // Populate initial elements for standalone mode
        updateElements(currentItems, menuLabelStack.join(" > "), hoveredIndex);

        // ── Key Picker Logic ──
        const keyPickerOverlay  = document.getElementById('key-picker-overlay');
        const keyDisplay        = document.getElementById('key-display');
        const keyPickerTitle    = document.getElementById('key-picker-title');
        const keyPickerConfirm  = document.getElementById('key-picker-confirm');

        let pendingKeyName = null;
        // Starts as true because the overlay begins with class="active"
        let keyPickerActive = true;


        // Keys that should NOT be selectable
        const blockedKeys = new Set(['Enter', 'Escape', 'Tab', 'CapsLock', 'Meta']);

        // Pretty name mapper for display
        function prettyKeyName(e) {
            const map = {
                ' ': 'Space', 'ArrowUp': '↑', 'ArrowDown': '↓',
                'ArrowLeft': '←', 'ArrowRight': '→',
                'Control': 'Ctrl', 'Alt': 'Alt', 'Shift': 'Shift'
            };
            return map[e.key] || (e.key.length === 1 ? e.key.toUpperCase() : e.key);
        }

        // Actual key name sent back to Lua (MappedKeys compatible)
        function luaKeyName(e) {
            const map = {
                'F1':'F1','F2':'F2','F3':'F3','F4':'F4','F5':'F5',
                'F6':'F6','F7':'F7','F8':'F8','F9':'F9','F10':'F10',
                'F11':'F11','F12':'F12',
                'Insert':'Insert','Delete':'Delete','Home':'Home','End':'End',
                'PageUp':'PageUp','PageDown':'PageDown',
                'ArrowUp':'ArrowUp','ArrowDown':'ArrowDown',
                'ArrowLeft':'ArrowLeft','ArrowRight':'ArrowRight',
                'Backspace':'Backspace','Pause':'Pause','PrintScreen':'PrintScreen',
                'ScrollLock':'ScrollLock','NumLock':'NumLock',
                'Shift':'Shift','Control':'Ctrl','Alt':'Alt',
                ' ':'Space'
            };
            if (map[e.key]) return map[e.key];
            if (e.key.length === 1) return e.key.toUpperCase();
            return e.key;
        }

        function openKeyPicker(titleText) {
            keyPickerActive = true;
            pendingKeyName  = null;
            keyDisplay.textContent = '— BEKLIYOR —';
            keyDisplay.classList.remove('has-key');
            keyPickerConfirm.classList.remove('ready');
            if (titleText) keyPickerTitle.textContent = titleText;
            keyPickerOverlay.classList.add('active');
        }

        function closeKeyPicker() {
            keyPickerActive = false;
            keyPickerOverlay.classList.remove('active');
        }

        // Global keydown — runs even when isFiveM = true so the picker works in-game
        window.addEventListener('keydown', function(e) {
            if (!keyPickerActive) return;

            if (e.key === 'Enter') {
                // Confirm selection
                if (pendingKeyName) {
                    // Send result back to Lua via postMessage
                    window.postMessage({ action: 'keyPickerResult', key: pendingKeyName }, '*');
                    // Also send via fetch for FiveM NUI callback
                    fetch('https://triggerderler-ui/keyPickerResult', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ key: pendingKeyName })
                    }).catch(() => {});
                    closeKeyPicker();
                }
                e.preventDefault();
                return;
            }

            if (e.key === 'Escape') {
                // Cancel
                closeKeyPicker();
                e.preventDefault();
                return;
            }

            if (blockedKeys.has(e.key)) return;
            e.preventDefault();

            pendingKeyName = luaKeyName(e);
            keyDisplay.textContent = prettyKeyName(e);
            keyDisplay.classList.add('has-key');
            keyPickerConfirm.classList.add('ready');
        }, true);

        keyPickerConfirm.addEventListener('click', function() {
            if (pendingKeyName) {
                window.postMessage({ action: 'keyPickerResult', key: pendingKeyName }, '*');
                fetch('https://triggerderler-ui/keyPickerResult', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ key: pendingKeyName })
                }).catch(() => {});
                closeKeyPicker();
            }
        });

        // Listen for messages from DUI/Lua SendMessage
        window.addEventListener('message', function(event) {
            const data = event.data;
            if (!data) return;

            switch(data.action) {
                case 'showUI':
                    if (data.visible) {
                        menuContainer.classList.add('active');
                        if (data.elements) {
                            updateElements(data.elements, data.path ? data.path.join(' > ') : '', data.index);
                        }
                    } else {
                        menuContainer.classList.remove('active');
                    }
                    break;
                case 'showMenu':
                    menuContainer.classList.add('active');
                    break;
                case 'hideMenu':
                    menuContainer.classList.remove('active');
                    break;
                case 'updateElements':
                    isFiveM = true;
                    updateElements(data.elements, data.path ? data.path.join(' > ') : '', data.index);
                    break;
                case 'showNotification':
                    addNotification(data.type, data.title, data.desc, data.duration);
                    break;
                case 'setPlayerId':
                    setPlayerId(data.id);
                    break;
                case 'setExpire':
                    setExpire(data.date);
                    break;
                case 'updateColor':
                case 'setTheme':
                    updateAccentColor(data.color);
                    break;
                case 'updateBanner':
                    updateBanner(data.bannerColor, data.bannerLink);
                    break;
                case 'showKeybinds':
                    updateKeybinds(data.binds);
                    break;
                case 'hideKeybinds':
                    keybindOverlay.classList.remove('active');
                    break;
                case 'showKeyPicker':
                    openKeyPicker(data.title || 'Menü Açma Tuşu');
                    break;
                case 'hideKeyPicker':
                    closeKeyPicker();
                    break;
                case 'keyPickerPreview':
                    // Lua sent back a preview of the pressed key
                    if (data.key) {
                        pendingKeyName = data.key;
                        keyDisplay.textContent = data.key;
                        keyDisplay.classList.add('has-key');
                        keyPickerConfirm.classList.add('ready');
                    }
                    break;
            }
        });
    </script>
</body>
</html>
